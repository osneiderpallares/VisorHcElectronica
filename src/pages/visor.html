<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0" />
	<meta http-equiv="X-UA-Compatible" content="ie=edge" />
	<title>Visor Nacional de Historia Clínica - Ministerio de Salud y Protección Social</title>
	<link href="https://cdn.datatables.net/v/bs5/dt-2.0.8/datatables.min.css" rel="stylesheet" />
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
	<link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.css" />
	<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
	
	
</head>
<body>
    <div class="main-wrapper">
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js" integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

        <div class="content-wrapper">
            <!-- Header Gobierno -->
            <header>
                <nav class="navbar header-govco">
                    <div class="container-fluid" style="height: 60px;">
                        <a class="navbar-brand" href="https://www.minsalud.gov.co/Portada2021/index.html">
                            <img src="https://www.secretariatransparencia.gov.co/SiteCollectionImages/gov.co-footer.png" alt="Logo Gov.co" style="height: 30px;" />
                        </a>
                    </div>
                </nav>
                
                <!-- Logo IHCE -->
                <div class="logo-container">
                    <div class="container text-center">
                        <img src="https://www.minsalud.gov.co/ihce/PublishingImages/Logos/logo-IHCE.png" alt="IHCE - Interoperabilidad de la Historia Clínica Electrónica" />
                    </div>
                </div>
            </header>

        <!-- Contenedor Principal -->
        <div class="main-container">
            <div class="accordion" id="accordionExample">

                <!-- Formulario de Consulta -->
                <div class="accordion-item card-custom">
                    <h2 class="accordion-header">
                        <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapseConsulta">
                            <i class='bx bxs-id-card bx-md icon-style'></i>
                            Consulta Información - Resumen Digital de Atención en Salud
                        </button>
                    </h2>
                    <div id="collapseConsulta" class="accordion-collapse collapse show" data-bs-parent="#accordionExample">
                        <div class="accordion-body">
                            <form>
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label for="inputDocumento" class="form-label">
                                            <i class='bx bx-id-card'></i> Número de Documento
                                        </label>
                                        <input type="text" class="form-control" id="inputDocumento" placeholder="Ingrese el número de documento" required />
                                    </div>
                                    <div class="col-md-6">
                                        <label for="inputTipoDocumento" class="form-label">
                                            <i class='bx bx-file'></i> Tipo de Documento
                                        </label>
                                        <select class="form-select" id="inputTipoDocumento">
                                            <option value="CC">Cédula de Ciudadanía</option>
                                            <option value="TI">Tarjeta de Identidad</option>
                                            <option value="CE">Cédula de Extranjería</option>
                                            <option value="PA">Pasaporte</option>
                                            <option value="RC">Registro Civil</option>
                                        </select>
                                    </div>
                                    
                                    <!-- Filtro de Fecha -->
                                    <div class="col-md-12">
                                        <div class="form-check form-switch">
                                            <input class="form-check-input" type="checkbox" role="switch" id="activarFiltroFecha">
                                            <label class="form-check-label" for="activarFiltroFecha">
                                                <i class='bx bx-filter'></i> <strong>Filtrar documentos desde una fecha específica</strong>
                                            </label>
                                        </div>
                                    </div>
                                    
                                    <div class="col-md-6" id="contenedorFecha" style="display: none;">
                                        <label for="inputFechaDesde" class="form-label">
                                            <i class="bx bx-calendar"></i> Fecha desde
                                        </label>
                                        <input type="date" class="form-control" id="inputFechaDesde" />
                                        <div class="form-text">
                                            Solo se mostrarán documentos actualizados desde esta fecha
                                        </div>
                                    </div>
                                    
                                    <div class="col-12">
                                        <hr class="my-4">
                                        <button type="submit" class="btn btn-primary btn-lg" id="consultaInfoIhce">
                                            <i class="bx bx-search-alt"></i> Consultar Información
                                        </button>
                                        <button type="button" class="btn btn-outline-secondary btn-lg ms-2" id="limpiarFiltros">
                                            <i class="bx bx-refresh"></i> Limpiar
                                        </button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- Información del Paciente -->
                <div class="accordion-item card-custom">
                    <h2 class="accordion-header" id="headingOne">
                        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseOne">
                            <i class='bx bxs-user-circle bx-md icon-style'></i>
                            Información del Paciente
                        </button>
                    </h2>
                    <div id="collapseOne" class="accordion-collapse collapse show" data-bs-parent="#accordionExample">
                        <div class="accordion-body" id="accordion-body-patient">
                            <!-- Contenido dinámico del paciente -->
                        </div>
                    </div>
                </div>

                <!-- Certificado de Vacunación -->
                <div class="accordion-item card-custom">
                    <h2 class="accordion-header" id="headingTwo">
                        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseTwo">
                            <i class='bx bxs-injection bx-md icon-style'></i>
                            Registros de Vacunación
                            <span class="badge bg-warning ms-2" id="contadorVacunas" style="display: none;">0</span>
                        </button>
                    </h2>
                    <div id="collapseTwo" class="accordion-collapse collapse" data-bs-parent="#accordionExample">
                        <div class="accordion-body" id="accordion-body-certificado">
                            <div class="row g-3 align-items-end mb-3">
                               
                            </div>
                            <div id="contenedorInmunizaciones" class="mt-3">
                                <table id="tablaInmunizaciones" class="table table-striped table-hover"></table>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Encuentros Clínicos -->
                <div class="accordion-item card-custom">
                    <h2 class="accordion-header" id="headingSeven">
                        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseSeven">
                            <i class='bx bxs-heart bx-md icon-style'></i>
                            Encuentros Clínicos
                            <span class="badge bg-success ms-2" id="contadorEncuentros" style="display: none;">0</span>
                        </button>
                    </h2>
                    <div id="collapseSeven" class="accordion-collapse collapse" data-bs-parent="#accordionExample">
                        <div class="accordion-body bg-light border-bottom">
                            <div class="row align-items-center">
                                <div class="col-md-8">
                                    <label for="filtroTipoEncuentro" class="form-label mb-1">
                                        <i class="bx bx-filter-alt"></i> <strong>Filtrar encuentros:</strong>
                                    </label>
                                    <select class="form-select" id="filtroTipoEncuentro">
                                        <option value="todos">📋 Todos</option>
                                        <option value="consulta">🚶 Consulta externa </option>
                                        <option value="hospitalización">🏥 Hospitalización</option>
                                        <option value="urgencias">🚑 Urgencias</option>
                                        
                                    </select>
                                </div>
                                <div class="col-md-4 text-end">
                                    <div class="mt-3">
                                        <span class="badge bg-info" id="badgeTotalEncuentros">Total: 0</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="accordion-body" id="accordion-body-encuentros" style="max-height: 500px; overflow-y: auto;">
                            <!-- Contenido dinámico de encuentros -->
                        </div>
                        <div class="accordion-body border-top">
                            <div id="paginacionEncuentros" class="d-flex justify-content-center flex-wrap gap-2"></div>
                        </div>
                    </div>
                </div>

                <!-- Historial de Atenciones -->
                <div class="accordion-item card-custom">
                    <h2 class="accordion-header" id="headingSix">
                        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseSix">
                            <i class='bx bxs-clinic bx-md icon-style'></i>
                            Historial de Atenciones en Salud Antecedentes manifestados por el paciente
                            <span class="badge bg-info ms-2" id="contadorDocumentos" style="display: none;">0</span>
                        </button>
                    </h2>
                    <div id="collapseSix" class="accordion-collapse collapse" data-bs-parent="#accordionExample">
                        <div class="accordion-body" id="accordion-body-envios" style="max-height: 500px; overflow-y: auto;">
                            <!-- Contenido dinámico del historial -->
                        </div>
                        <div class="accordion-body border-top">
                            <div id="paginacion" class="d-flex justify-content-center flex-wrap gap-2"></div>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <!-- Modal de Detalle -->
        <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered modal-xl modal-dialog-scrollable">
                <div class="modal-content">
                    <div class="modal-header">
                        <h2 id="exampleModalLabel" class="mb-0">
                            <i class='bx bxs-detail bx-md'></i>
                            Detalle del Resumen de Atención en Salud
                        </h2>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body" id="mostrarCompositions">
                        <div class="text-center text-muted p-5">
                            <i class='bx bx-info-circle bx-lg'></i>
                            <p>Seleccione un documento para ver los detalles</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Modal de Carga -->
        <div class="modal fade" id="loadingModal" tabindex="-1" aria-labelledby="loadingModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-body text-center p-5">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Cargando...</span>
                        </div>
                        <p class="mt-3 mb-0 fw-bold">Consultando Información...</p>
                        <p class="text-muted small">Por favor espere</p>
                    </div>
                </div>
            </div>
        </div>
        </div>
        <!-- Fin del content-wrapper -->
    </div>
    <!-- Fin del main-wrapper -->
    
    <!-- Footer -->
    <footer class="footer-govco">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-6">
                    <a href="https://www.minsalud.gov.co/Portada2021/index.html" class="d-flex align-items-center gap-3">
                        <img src="https://cdn.www.gov.co/v4/assets/images/logo-colombia.svg" alt="Logo Colombia" style="height: 50px;" />
                        <img src="https://www.secretariatransparencia.gov.co/SiteCollectionImages/gov.co-footer.png" alt="Logo Gov.co" style="height: 30px;" />
                    </a>
                </div>
                <div class="col-md-6 text-end text-white">
                    <small>© 2026 Ministerio de Salud y Protección Social</small>
                </div>
            </div>
        </div>
    </footer>

    <script>
        // Control de visibilidad del filtro de fecha
        document.addEventListener('DOMContentLoaded', function() {
            const activarFiltro = document.getElementById('activarFiltroFecha');
            const contenedorFecha = document.getElementById('contenedorFecha');
            const inputFecha = document.getElementById('inputFechaDesde');
            const limpiarBtn = document.getElementById('limpiarFiltros');
            
            activarFiltro.addEventListener('change', function() {
                if (this.checked) {
                    contenedorFecha.style.display = 'block';
                    if (!inputFecha.value) {
                        inputFecha.value = '2025-05-01';
                    }
                } else {
                    contenedorFecha.style.display = 'none';
                    inputFecha.value = '';
                }
            });
            
            limpiarBtn.addEventListener('click', function() {
                document.getElementById('inputDocumento').value = '';
                document.getElementById('inputTipoDocumento').value = 'CC';
                activarFiltro.checked = false;
                contenedorFecha.style.display = 'none';
                inputFecha.value = '';
                
                const filtroEncuentro = document.getElementById('filtroTipoEncuentro');
                if (filtroEncuentro) filtroEncuentro.value = 'todos';
                
                document.getElementById('accordion-body-patient').innerHTML = '';
                document.getElementById('accordion-body-envios').innerHTML = '';
                
                const contador = document.getElementById('contadorDocumentos');
                if (contador) {
                    contador.style.display = 'none';
                    contador.textContent = '0';
                }
            });
            
            window.obtenerParametrosConsulta = function() {
                const documento = document.getElementById('inputDocumento').value;
                const tipoDocumento = document.getElementById('inputTipoDocumento').value;
                const fechaDesde = activarFiltro.checked ? inputFecha.value : null;
                return { documento, tipoDocumento, fechaDesde };
            };
        });
    </script>

    <script src="https://cdn.datatables.net/v/bs5/dt-2.0.8/datatables.min.js"></script>
    <script src="/consultas_rda.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.js"></script>

</body>
</html>
